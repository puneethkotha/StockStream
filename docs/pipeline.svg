<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 400" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0 0 L8 3 L0 6 Z" fill="#71717a"/>
    </marker>
  </defs>
  <!-- Node shapes with distinct geometry -->
  <!-- 1. Yahoo API - pill (data source) -->
  <rect x="24" y="35" width="72" height="36" rx="18" fill="#27272a" stroke="#52525b" stroke-width="1"/>
  <text x="60" y="58" font-size="11" fill="#e4e4e7" text-anchor="middle">Yahoo API</text>

  <!-- 2. Producer - rounded rect -->
  <rect x="130" y="42" width="110" height="34" rx="6" fill="#27272a" stroke="#52525b" stroke-width="1"/>
  <text x="185" y="64" font-size="11" fill="#e4e4e7" text-anchor="middle">Producer</text>

  <!-- 3. Kafka - hexagon -->
  <path d="M310 60 L370 90 L370 150 L310 180 L250 150 L250 90 Z" fill="#27272a" stroke="#52525b" stroke-width="1"/>
  <text x="310" y="125" font-size="12" font-weight="600" fill="#e4e4e7" text-anchor="middle">Kafka</text>

  <!-- 4. Consumer - rounded rect -->
  <rect x="130" y="145" width="110" height="34" rx="6" fill="#27272a" stroke="#52525b" stroke-width="1"/>
  <text x="185" y="167" font-size="11" fill="#e4e4e7" text-anchor="middle">Consumer</text>

  <!-- 5. Spark - diamond (processor) -->
  <path d="M250 215 L305 250 L250 285 L195 250 Z" fill="#27272a" stroke="#52525b" stroke-width="1"/>
  <text x="250" y="253" font-size="11" font-weight="600" fill="#e4e4e7" text-anchor="middle">Spark</text>

  <!-- 6. InfluxDB - cylinder (DB) -->
  <path d="M108 305 L108 335 L192 335 L192 305 Z" fill="#27272a" stroke="#52525b" stroke-width="1"/>
  <ellipse cx="150" cy="305" rx="42" ry="10" fill="#27272a" stroke="#52525b" stroke-width="1"/>
  <ellipse cx="150" cy="335" rx="42" ry="10" fill="#1a1a1d" stroke="#52525b" stroke-width="1"/>
  <text x="150" y="360" font-size="11" fill="#e4e4e7" text-anchor="middle">InfluxDB</text>

  <!-- 7. PostgreSQL - cylinder -->
  <path d="M308 305 L308 335 L392 335 L392 305 Z" fill="#27272a" stroke="#52525b" stroke-width="1"/>
  <ellipse cx="350" cy="305" rx="42" ry="10" fill="#27272a" stroke="#52525b" stroke-width="1"/>
  <ellipse cx="350" cy="335" rx="42" ry="10" fill="#1a1a1d" stroke="#52525b" stroke-width="1"/>
  <text x="350" y="360" font-size="11" fill="#e4e4e7" text-anchor="middle">PostgreSQL</text>

  <!-- 8. Grafana - rounded rect -->
  <rect x="108" y="375" width="84" height="20" rx="4" fill="#27272a" stroke="#52525b" stroke-width="1"/>
  <text x="150" y="389" font-size="10" fill="#e4e4e7" text-anchor="middle">Grafana</text>

  <!-- Arrows: from node edge to node edge -->
  <path d="M96 53 L130 59" stroke="#71717a" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M240 59 L285 85" stroke="#71717a" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M250 120 L240 162" stroke="#71717a" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M185 179 L232 228" stroke="#71717a" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M218 268 L135 298" stroke="#71717a" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M282 268 L315 298" stroke="#71717a" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M150 338 L150 375" stroke="#71717a" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
</svg>
