<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 380" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arr" markerWidth="6" markerHeight="5" refX="5" refY="2.5" orient="auto">
      <path d="M0 0 L6 2.5 L0 5 Z" fill="#94a3b8"/>
    </marker>
  </defs>
  <!-- Compact pipeline: top → bottom, centered -->
  <!-- 1. Yahoo API - pill, blue -->
  <rect x="118" y="8" width="84" height="28" rx="14" fill="#2563eb" stroke="#3b82f6" stroke-width="1"/>
  <text x="160" y="27" font-size="9" fill="white" text-anchor="middle">Yahoo API</text>

  <!-- 2. Producer - rounded rect, teal -->
  <rect x="125" y="52" width="70" height="26" rx="5" fill="#0d9488" stroke="#14b8a6" stroke-width="1"/>
  <text x="160" y="70" font-size="9" fill="white" text-anchor="middle">Producer</text>

  <!-- 3. Kafka - hexagon, dark -->
  <path d="M160 95 L195 110 L195 150 L160 165 L125 150 L125 110 Z" fill="#1f2937" stroke="#374151" stroke-width="1"/>
  <text x="160" y="134" font-size="10" font-weight="600" fill="#e5e7eb" text-anchor="middle">Kafka</text>

  <!-- 4. Consumer - rounded rect, teal -->
  <rect x="125" y="182" width="70" height="26" rx="5" fill="#0d9488" stroke="#14b8a6" stroke-width="1"/>
  <text x="160" y="200" font-size="9" fill="white" text-anchor="middle">Consumer</text>

  <!-- 5. Spark - diamond, orange -->
  <path d="M160 225 L195 248 L160 271 L125 248 Z" fill="#ea580c" stroke="#f97316" stroke-width="1"/>
  <text x="160" y="250" font-size="9" font-weight="600" fill="white" text-anchor="middle">Spark</text>

  <!-- 6. InfluxDB - cylinder, purple -->
  <path d="M98 290 L98 312 L142 312 L142 290 Z" fill="#7c3aed" stroke="#8b5cf6" stroke-width="1"/>
  <ellipse cx="120" cy="290" rx="22" ry="6" fill="#7c3aed" stroke="#8b5cf6" stroke-width="1"/>
  <ellipse cx="120" cy="312" rx="22" ry="6" fill="#5b21b6" stroke="#8b5cf6" stroke-width="1"/>
  <text x="120" y="332" font-size="9" fill="#e4e4e7" text-anchor="middle">InfluxDB</text>

  <!-- 7. PostgreSQL - cylinder, blue -->
  <path d="M178 290 L178 312 L222 312 L222 290 Z" fill="#2563eb" stroke="#3b82f6" stroke-width="1"/>
  <ellipse cx="200" cy="290" rx="22" ry="6" fill="#2563eb" stroke="#3b82f6" stroke-width="1"/>
  <ellipse cx="200" cy="312" rx="22" ry="6" fill="#1d4ed8" stroke="#3b82f6" stroke-width="1"/>
  <text x="200" y="332" font-size="9" fill="#e4e4e7" text-anchor="middle">PostgreSQL</text>

  <!-- 8. Grafana - rounded rect, orange -->
  <rect x="125" y="352" width="70" height="22" rx="4" fill="#ea580c" stroke="#f97316" stroke-width="1"/>
  <text x="160" y="367" font-size="9" fill="white" text-anchor="middle">Grafana</text>

  <!-- Arrows - vertical flow -->
  <path d="M160 36 L160 52" stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <path d="M160 78 L160 95" stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <path d="M160 165 L160 182" stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <path d="M160 208 L160 225" stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <!-- Spark → branch point -->
  <path d="M160 271 L160 282" stroke="#94a3b8" stroke-width="1.5" fill="none"/>
  <path d="M160 282 L120 290" stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <path d="M160 282 L200 290" stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <path d="M120 318 L160 352" stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
</svg>
