<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 90" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arr" markerWidth="5" markerHeight="4" refX="4" refY="2" orient="auto">
      <path d="M0 0 L5 2 L0 4 Z" fill="#22c55e"/>
    </marker>
  </defs>
  <!-- Flow: Yahoo → Producer → Kafka → Consumer → Spark ─┬→ InfluxDB → Grafana -->
  <!--                                                 └→ PostgreSQL -->
  <!-- Row 1 -->
  <rect x="0" y="28" width="58" height="24" rx="12" fill="#2563eb" stroke="#3b82f6" stroke-width="1"/>
  <text x="29" y="44" font-size="7" font-weight="500" fill="white" text-anchor="middle">Yahoo API</text>

  <rect x="78" y="30" width="46" height="20" rx="6" fill="#0d9488" stroke="#14b8a6" stroke-width="1"/>
  <text x="101" y="44" font-size="7" fill="white" text-anchor="middle">Producer</text>

  <path d="M144 32 L168 44 L168 64 L144 76 L120 64 L120 44 Z" fill="#18181b" stroke="#3f3f46" stroke-width="1"/>
  <text x="144" y="56" font-size="7" font-weight="600" fill="#d4d4d8" text-anchor="middle">Kafka</text>

  <rect x="188" y="30" width="46" height="20" rx="6" fill="#0d9488" stroke="#14b8a6" stroke-width="1"/>
  <text x="211" y="44" font-size="7" fill="white" text-anchor="middle">Consumer</text>

  <path d="M254 34 L274 46 L254 58 L234 46 Z" fill="#ea580c" stroke="#f97316" stroke-width="1"/>
  <text x="254" y="48" font-size="7" font-weight="600" fill="white" text-anchor="middle">Spark</text>

  <!-- Arrows row 1 -->
  <path d="M58 40 L78 40" stroke="#22c55e" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <path d="M124 44 L144 44" stroke="#22c55e" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <path d="M168 46 L188 42" stroke="#22c55e" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <path d="M234 44 L254 44" stroke="#22c55e" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>

  <!-- Branch: Spark → InfluxDB, Spark → PostgreSQL -->
  <path d="M274 46 L298 32" stroke="#22c55e" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <path d="M274 46 L298 60" stroke="#22c55e" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>

  <!-- InfluxDB & PostgreSQL (row 2) -->
  <path d="M298 18 L298 30 L322 30 L322 18 Z" fill="#7c3aed" stroke="#8b5cf6" stroke-width="1"/>
  <ellipse cx="310" cy="18" rx="12" ry="3" fill="#7c3aed" stroke="#8b5cf6" stroke-width="1"/>
  <ellipse cx="310" cy="30" rx="12" ry="3" fill="#5b21b6" stroke="#8b5cf6" stroke-width="1"/>
  <text x="310" y="46" font-size="7" fill="#e4e4e7" text-anchor="middle">InfluxDB</text>

  <path d="M298 48 L298 60 L322 60 L322 48 Z" fill="#2563eb" stroke="#3b82f6" stroke-width="1"/>
  <ellipse cx="310" cy="48" rx="12" ry="3" fill="#2563eb" stroke="#3b82f6" stroke-width="1"/>
  <ellipse cx="310" cy="60" rx="12" ry="3" fill="#1d4ed8" stroke="#3b82f6" stroke-width="1"/>
  <text x="310" y="76" font-size="7" fill="#e4e4e7" text-anchor="middle">PostgreSQL</text>

  <!-- Grafana (right of InfluxDB) -->
  <rect x="342" y="36" width="52" height="20" rx="6" fill="#ea580c" stroke="#f97316" stroke-width="1"/>
  <text x="368" y="50" font-size="7" fill="white" text-anchor="middle">Grafana</text>

  <!-- InfluxDB → Grafana, PostgreSQL → Grafana -->
  <path d="M322 24 L342 46" stroke="#22c55e" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <path d="M322 54 L342 46" stroke="#22c55e" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
</svg>
